<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#EDF6F9" />

    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta
      name="description"
      content="{% block description %}{{ config.description }}{% endblock description %}"
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Public+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    {% block extra_head %}{% endblock extra_head %}

    <style>
      html {
        background: var(--bg, #EDF6F9);
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg, #EDF6F9);
      }
    </style>
  </head>

  <body>
    {% block content %}{% endblock content %}
  </body>
</html>
