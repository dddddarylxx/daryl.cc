<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} · {{ config.title }}</title>
    <meta name="description" content="{{ page.description | default(value=config.description) }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Zilla+Slab:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f9fafb;
        --text: #111111;
        --muted: #666666;
        --max: 44rem;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Zilla Slab", Georgia, serif;
        line-height: 1.7;
      }

      main {
        max-width: var(--max);
        margin: 0 auto;
        padding: 4.5rem 1.25rem 4rem;
      }

      .back {
        display: inline-block;
        margin-bottom: 1.75rem;
        color: var(--muted);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
      }

      .back:hover {
        text-decoration: underline;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .desc {
        max-width: 36rem;
        margin: 0 0 0.5rem;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .meta {
        margin-bottom: 2rem;
        color: var(--muted);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .content p {
        margin: 0 0 1.2rem;
        font-size: 1.08rem;
      }

      .content strong {
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="/">← Index</a>

      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="desc">{{ page.description }}</p>
      {% endif %}
      <div class="meta">{{ page.date | date(format="%b %d, %Y") }}</div>

      <div class="content">
        {{ page.content | safe }}
      </div>
    </main>
  </body>
</html>
